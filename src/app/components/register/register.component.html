<section class="bg-light d-flex justify-content-center align-items-center min-vh-100">
    <div class="container">
        <div class="row gy-4 align-items-center">
            <div class="col-12 col-md-6 col-xl-7">
                <div class="d-flex justify-content-center p-4 rounded-4">
                    <div class="col-12 col-xl-9">
                        <h6 class="h3 mb-4">User Registration.</h6>
                        <p class="mb-0 text-secondary">
                            Create your account to get started.
                        </p>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-xl-5">
                <div class="card border-0 rounded-4 shadow-sm">
                    <div class="card-body p-3 p-md-4 p-xl-5">
                        <div class="row">
                            <div class="col-12">
                                <div class="mb-4">
                                    <h3>Sign up</h3>
                                    <p>
                                        Already have an account?
                                        <a (click)="onBtnLoginClick()" class="text-primary text-decoration-none">Sign
                                            in</a>
                                    </p>
                                </div>
                            </div>
                        </div>

                        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                            <div class="row gy-3 overflow-hidden">
                                <div class="col-12 col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control" id="firstName"
                                            formControlName="firstName" placeholder="First Name" />
                                        <label for="firstName">First Name</label>
                                        <small
                                            *ngIf="f['firstName'].invalid && (f['firstName'].touched || f['firstName'].dirty)"
                                            class="form-text text-danger">
                                            First name is required.
                                        </small>
                                    </div>
                                </div>

                                <div class="col-12 col-md-6">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control" id="lastName" formControlName="lastName"
                                            placeholder="Last Name" />
                                        <label for="lastName">Last Name</label>
                                        <small
                                            *ngIf="f['lastName'].invalid && (f['lastName'].touched || f['lastName'].dirty)"
                                            class="form-text text-danger">
                                            Last name is required.
                                        </small>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input type="email" class="form-control" id="email" formControlName="email"
                                            placeholder="name@example.com" />
                                        <label for="email">Email</label>
                                        <small *ngIf="f['email'].invalid && (f['email'].touched || f['email'].dirty)"
                                            class="form-text text-danger">
                                            A valid email is required.
                                        </small>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="form-floating mb-3">
                                        <input type="password" class="form-control" id="password"
                                            formControlName="password" placeholder="Password" />
                                        <label for="password">Password</label>
                                        <small
                                            *ngIf="f['password'].invalid && (f['password'].touched || f['password'].dirty)"
                                            class="form-text text-danger">
                                            Password is required and must be at least 6 characters.
                                        </small>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="d-grid">
                                        <button class="btn btn-primary btn-lg" type="submit"
                                            [disabled]="registerForm.invalid">
                                            Create account
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </form>

                        <div class="row">
                            <div class="col-12">
                                <div class="d-flex gap-2 gap-md-4 flex-column flex-md-row justify-content-md-end mt-4">
                                    <a routerLink="/login" class="text-decoration-none">Back to login</a>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
